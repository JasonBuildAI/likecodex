[project]
name = "likecodex"
version = "0.1.0"
description = "LikeCodex - A production-grade Codex-like coding agent"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "likecodex-engine",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.5",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
]

[tool.uv.workspace]
members = ["packages/likecodex-engine"]

[tool.uv.sources]
likecodex-engine = { workspace = true }

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]

[tool.pytest.ini_options]
testpaths = ["packages/likecodex-engine/tests", "tests"]
python_files = ["test_*.py", "*_test.py"]
markers = [
    "integration: full-stack tests requiring engine and Rust server",
]
