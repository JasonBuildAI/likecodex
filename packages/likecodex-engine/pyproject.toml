[project]
name = "likecodex-engine"
version = "0.2.0"
description = "LikeCodex Agent Engine - the Python brain behind LikeCodex"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10",
    "httpx>=0.28",
    "openai>=1.68",
    "tiktoken>=0.9",
    "aiofiles>=24.1",
    "aiohttp>=3.11",
    "structlog>=24.4",
    "pyyaml>=6.0",
    "rich>=13.9",
    "pillow>=11.0",
    "markdown-it-py>=3.0",
]

[project.optional-dependencies]
sandbox = [
    "docker>=7.0",
]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.25",
    "ruff>=0.9",
    "mypy>=1.14",
    "pytest-cov>=6.0",
]
memory = [
    "chromadb>=0.6",
    "faiss-cpu>=1.10",
    "sentence-transformers>=3.4",
]
browser = [
    "playwright>=1.50",
    "pillow>=11.0",
    "html2text>=2024.2",
]
vision = [
    "pillow>=11.0",
    "opencv-python>=4.11",
]
all = [
    "likecodex-engine[sandbox]",
    "likecodex-engine[memory]",
    "likecodex-engine[dev]",
    "likecodex-engine[browser]",
    "likecodex-engine[vision]",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["likecodex_engine*"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: requires running engine server",
    "slow: longer than 5 seconds",
    "multimodal: requires vision dependencies",
    "browser: requires playwright",
]
