[project]
name = "likecodex-engine"
version = "0.1.0"
description = "LikeCodex Agent Engine - the Python brain behind LikeCodex"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "openai>=1.35",
    "tiktoken>=0.7",
    "aiofiles>=24.0",
    "aiohttp>=3.9",
    "structlog>=24.0",
    "pyyaml>=6.0",
    "rich>=13.0",
    "tomli>=2.0; python_version < '3.11'",
]

[project.optional-dependencies]
sandbox = [
    "docker>=6.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.5",
    "mypy>=1.10",
]
memory = [
    "chromadb>=0.5",
    "faiss-cpu>=1.8",
]
all = [
    "likecodex-engine[sandbox]",
    "likecodex-engine[memory]",
    "likecodex-engine[dev]",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["likecodex_engine*"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true
