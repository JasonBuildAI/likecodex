<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LikeCodex</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script>hljs.highlightAll();marked.setOptions({breaks:true,gfm:true});
function escapeHtml(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}
function safeRender(raw){
  if(!raw||typeof raw!=='string')return'';
  const t=raw.trim();
  if(!t)return'';
  // try JSON parse — if succeeds, it's structured data, render as monospace blob
  try{const j=JSON.parse(t);
    if(j&&typeof j==='object'){
      if(j.questions||j.request_id||j.question){return renderAskBlock(j);}
      return'<div class="raw-data">'+escapeHtml(t)+'</div>';
    }
  }catch(e){}
  // looks like JSON but not parseable — still render safely
  if(/^[\{\[].*[:}]/.test(t.slice(0,30))){return'<div class="raw-data">'+escapeHtml(t)+'</div>';}
  return marked.parse(t)||'';
}
function renderAskBlock(j){
  let html='<div class="ask-card">';
  const q=j.question||(j.questions&&j.questions[0]&&j.questions[0].question)||'';
  const opts=(j.questions&&j.questions[0]&&j.questions[0].options)||j.options||[];
  html+='<div class="ask-title">🧑‍⚖️ 需要你确认</div>';
  if(q)html+='<div class="ask-question">'+escapeHtml(q)+'</div>';
  if(opts.length){
    html+='<div class="ask-opts">';
    if(typeof opts[0]==='string'){opts.forEach(o=>{html+='<div class="ask-opt">'+escapeHtml(o)+'</div>';});}
    else{opts.forEach(o=>{html+='<div class="ask-opt">'+(o.label||o.text||o)+'</div>';});}
    html+='</div>';
  }else{html+='<div class="raw-data">'+escapeHtml(JSON.stringify(j,null,2))+'</div>';}
  html+='</div>';
  return html;
}
</script>
<style>
:root{--bg-primary:#0d1117;--bg-secondary:#161b22;--bg-tertiary:#21262d;--bg-hover:#30363d;--text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#484f58;--border-color:#30363d;--accent:#58a6ff;--accent-hover:#79c0ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff;--sidebar-width:260px;--header-height:48px;--radius:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif;--font-mono:'JetBrains Mono','SF Mono',Consolas,monospace}
[data-theme="light"]{--bg-primary:#ffffff;--bg-secondary:#f6f8fa;--bg-tertiary:#eaeef2;--bg-hover:#d0d7de;--text-primary:#1f2328;--text-secondary:#656d76;--text-muted:#8c959f;--border-color:#d0d7de;--accent:#0969da;--accent-hover:#0550ae;--green:#1a7f37;--yellow:#9a6700;--red:#cf222e;--purple:#8250df}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);height:100vh;overflow:hidden;font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;width:100vw}
.header{height:var(--header-height);display:flex;align-items:center;padding:0 12px;border-bottom:1px solid var(--border-color);background:var(--bg-secondary);gap:10px;flex-shrink:0;user-select:none}
.header-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.header-title svg{width:18px;height:18px}
.header-status{display:flex;align-items:center;gap:10px;margin-left:auto;font-size:11px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.status-dot.green{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.yellow{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.status-dot.red{background:var(--red);box-shadow:0 0 6px var(--red)}
.status-item{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:var(--radius);cursor:default;color:var(--text-secondary)}
.btn-icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);border:1px solid var(--border-color);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-icon:hover{background:var(--bg-hover);color:var(--text-primary)}
.sidebar{width:var(--sidebar-width);min-width:var(--sidebar-width);background:var(--bg-secondary);border-right:1px solid var(--border-color);display:flex;flex-direction:column;height:100vh;flex-shrink:0;overflow:hidden;transition:margin-left .25s ease}
.sidebar.collapsed{margin-left:calc(var(--sidebar-width)*-1)}
.sidebar-header{padding:10px;border-bottom:1px solid var(--border-color);display:flex;gap:8px}
.sidebar-header button{flex:1;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary);cursor:pointer;font-size:13px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.sidebar-header button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.sidebar-header .close-btn{flex:0;padding:8px 10px}
.sidebar-list{flex:1;overflow-y:auto;padding:6px;min-height:0}
.session-item{padding:9px 10px;border-radius:var(--radius);cursor:pointer;margin-bottom:1px;transition:background .2s;display:flex;align-items:center;gap:8px;font-size:13px}
.session-item:hover{background:var(--bg-hover)}
.session-item.active{background:var(--bg-tertiary);border-left:3px solid var(--accent)}
.session-item .sess-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item .sess-del{opacity:0;transition:opacity .2s;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:2px}
.session-item:hover .sess-del{opacity:1}
.session-item .sess-del:hover{color:var(--red)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.messages{flex:1;overflow-y:auto;padding:20px 16px;scroll-behavior:smooth}
.msg{margin-bottom:14px;max-width:820px;margin-left:auto;margin-right:auto;width:100%}
.msg.user .msg-bubble{background:var(--bg-tertiary);border:1px solid var(--border-color)}
.msg.assistant .msg-bubble{background:var(--bg-secondary);border:1px solid var(--border-color)}
.msg-bubble{padding:14px;border-radius:var(--radius);line-height:1.6}
.msg-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;color:var(--text-secondary)}
.msg-header .avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.msg.user .avatar{background:var(--accent);color:#fff}
.msg.assistant .avatar{background:var(--purple);color:#fff}
.msg-content{color:var(--text-primary);overflow-wrap:break-word;line-height:1.6}
.msg-content p{margin-bottom:4px}
.msg-content p:last-child{margin-bottom:0}
.msg-content pre{background:var(--bg-primary)!important;border:1px solid var(--border-color);border-radius:6px;padding:12px;overflow-x:auto;margin:8px 0;font-size:13px;max-width:100%}
.msg-content code{font-family:var(--font-mono);font-size:13px}
.msg-content p>code{background:var(--bg-tertiary);padding:2px 6px;border-radius:4px;font-size:13px}
.msg-content ul,.msg-content ol{padding-left:20px;margin:6px 0}
.msg-content blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--text-secondary);margin:6px 0}
.msg-content h1{font-size:18px;margin:10px 0 6px}
.msg-content h2{font-size:16px;margin:8px 0 4px}
.msg-content h3{font-size:15px;margin:6px 0 4px}
.msg-content table{border-collapse:collapse;margin:6px 0;width:100%;font-size:13px}
.msg-content th,.msg-content td{border:1px solid var(--border-color);padding:6px 10px;text-align:left}
.msg-content th{background:var(--bg-tertiary);font-weight:600}
.msg-content :not(pre)>code{background:var(--bg-tertiary);padding:2px 6px;border-radius:4px;font-size:13px}
.reasoning-block{margin:8px 0;border:1px solid var(--border-color);border-radius:6px;overflow:hidden}
.reasoning-header{padding:8px 12px;background:var(--bg-tertiary);cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);user-select:none;transition:background .2s}
.reasoning-header:hover{background:var(--bg-hover)}
.reasoning-header svg{transition:transform .2s}
.reasoning-header.open svg{transform:rotate(90deg)}
.reasoning-content{display:none;padding:12px;background:var(--bg-primary);font-size:13px;color:var(--text-secondary);border-top:1px solid var(--border-color);line-height:1.6;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.reasoning-content.open{display:block}
.tool-call{margin:8px 0;padding:10px 12px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:6px;font-size:13px}
.tool-call .tc-name{font-weight:600;color:var(--accent);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.tool-call .tc-args{color:var(--text-secondary);white-space:pre-wrap;font-family:var(--font-mono);font-size:12px;max-height:200px;overflow-y:auto}
.ask-card{background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:8px;padding:14px;margin:8px 0}
.ask-card .ask-title{font-size:13px;color:var(--accent);margin-bottom:10px;font-weight:600}
.ask-card .ask-question{font-size:14px;margin-bottom:10px;color:var(--text-primary)}
.ask-card .ask-opts{display:flex;flex-direction:column;gap:6px}
.ask-card .ask-opt{padding:8px 12px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s;text-align:left}
.ask-card .ask-opt:hover{border-color:var(--accent);color:var(--accent)}
.raw-data{background:var(--bg-tertiary);color:var(--text-secondary);padding:10px;border-radius:6px;font-size:12px;font-family:var(--font-mono);white-space:pre-wrap;word-break:break-all;margin:6px 0;max-height:400px;overflow-y:auto;border:1px dashed var(--border-color)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:12px;padding:40px}
.empty-state svg{width:48px;height:48px;opacity:.3}
.empty-state h2{font-size:18px;font-weight:600;color:var(--text-secondary)}
.empty-state p{font-size:14px;max-width:440px;text-align:center}
.input-area{padding:12px 16px 14px;border-top:1px solid var(--border-color);background:var(--bg-secondary);flex-shrink:0}
.input-wrap{display:flex;gap:8px;align-items:flex-end;max-width:820px;margin:0 auto;width:100%;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:var(--radius);padding:4px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--accent)}
.input-wrap textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text-primary);font-family:var(--font);font-size:14px;padding:8px 12px;resize:none;min-height:38px;max-height:240px;line-height:1.5}
.input-wrap button{width:36px;height:36px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.input-wrap button:hover{background:var(--accent-hover)}
.input-wrap button:disabled{opacity:.4;cursor:not-allowed}
.input-wrap button svg{width:18px;height:18px}
.input-wrap button.stop-btn{background:var(--red)}
.input-wrap button.stop-btn:hover{background:rgba(248,81,73,.8)}
.input-info{display:flex;justify-content:space-between;align-items:center;max-width:820px;margin:4px auto 0;padding:0 4px;font-size:12px;color:var(--text-muted)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:12px;padding:24px;width:420px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.3)}
.modal h2{font-size:18px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal h2 svg{width:20px;height:20px}
.modal-close{float:right;background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:20px;padding:4px;border-radius:4px}
.modal-close:hover{color:var(--text-primary);background:var(--bg-hover)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text-secondary)}
.form-group input,.form-group select{width:100%;padding:8px 12px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary);font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group input[type="password"]{font-family:var(--font-mono);letter-spacing:1px}
.form-group .hint{font-size:12px;color:var(--text-muted);margin-top:4px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.btn-opt{padding:6px 14px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-tertiary);color:var(--text-primary);cursor:pointer;font-size:13px;transition:all .2s}
.btn-opt:hover{border-color:var(--accent);color:var(--accent)}
.btn-opt.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border-color)}
.modal-actions button{flex:1;padding:8px 16px;border-radius:6px;border:1px solid var(--border-color);cursor:pointer;font-size:14px;transition:all .2s}
.modal-actions .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-actions .btn-primary:hover{background:var(--accent-hover)}
.modal-actions .btn-secondary{background:var(--bg-tertiary);color:var(--text-primary)}
.modal-actions .btn-secondary:hover{background:var(--bg-hover)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-hover);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
.toast-container{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:slideIn .3s;max-width:360px}
.toast.success{background:var(--green);color:#fff}
.toast.error{background:var(--red);color:#fff}
.toast.info{background:var(--accent);color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){
  .sidebar{position:fixed;z-index:50;left:0;top:0;box-shadow:4px 0 24px rgba(0,0,0,.3)}
  .sidebar.collapsed{margin-left:calc(var(--sidebar-width)*-1);box-shadow:none}
  .header-status .hide-mobile{display:none}
  .modal{width:95vw;padding:16px}
}
.loading-dots{display:inline-flex;gap:4px;padding:4px 0}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--text-secondary);animation:bounce 1.4s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6)}40%{transform:scale(1)}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button onclick="createNewSession()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2Z"/></svg>
        新建
      </button>
      <button class="close-btn" onclick="collapseSidebar()" title="收起侧边栏">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1 1.06 1.06L9.06 8l3.22 3.22a.75.75 0 1 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/></svg>
      </button>
    </div>
    <div class="sidebar-list" id="sessionList"></div>
  </aside>
  <div class="main">
    <header class="header">
      <button class="btn-icon" id="sidebarToggle" onclick="toggleSidebar()" title="切换侧边栏 (Ctrl+B)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.75A.75.75 0 0 1 1.75 2h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 2.75Zm0 5A.75.75 0 0 1 1.75 7h12.5a.75.75 0 0 1 0 1.5H1.75A.75.75 0 0 1 1 7.75Zm0 5a.75.75 0 0 1 .75-.75h12.5a.75.75 0 0 1 0 1.5H1.75a.75.75 0 0 1-.75-.75Z"/></svg>
      </button>
      <div class="header-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        LikeCodex
      </div>
      <div class="header-status">
        <span class="status-item hide-mobile" id="modelStatus">模型: -</span>
        <span class="status-item" id="apiKeyStatus"><span class="status-dot yellow"></span>API Key</span>
        <span class="status-item" id="connStatus"><span class="status-dot green"></span>已连接</span>
        <button class="btn-icon" onclick="openSettings()" title="设置">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492ZM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0Z"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.902 3.433 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.433-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.892-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319Z"/></svg>
        </button>
      </div>
    </header>
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <h2>LikeCodex</h2>
        <p>AI 驱动的代码助手。输入你的问题开始对话。</p>
      </div>
      <div class="messages" id="messages" style="display:none"></div>
      <div class="input-area">
        <div class="input-wrap">
          <textarea id="input" rows="1" placeholder="输入消息... (Enter 发送 / Shift+Enter 换行)" onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
          <button id="sendBtn" onclick="handleSend()" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
        <div class="input-info">
          <span id="inputInfo">Enter 发送</span>
          <span id="sessionInfo"></span>
          <span id="msgCount" style="display:none"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <button class="modal-close" onclick="closeSettings()">&times;</button>
    <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>设置</h2>
    <div class="form-group">
      <label>API Key (DeepSeek)</label>
      <div style="display:flex;gap:8px">
        <input type="password" id="settingsApiKey" placeholder="sk-..." style="flex:1;font-family:var(--font-mono)" autocomplete="off">
        <button class="btn-opt" onclick="toggleKeyVisibility()" id="keyToggle" style="flex-shrink:0">显示</button>
      </div>
      <div class="hint"><span id="keyConfigStatus" style="color:var(--green)">✓ 已加载配置</span><br><span style="color:var(--text-muted);font-size:11px">在此输入的 Key 会覆盖配置文件</span></div>
    </div>
    <div class="form-group">
      <label>模型</label>
      <div class="btn-group" id="modelBtns">
        <button class="btn-opt active" data-model="deepseek-v4-flash">Flash</button>
        <button class="btn-opt" data-model="deepseek-v4-pro">Pro</button>
      </div>
    </div>
    <div class="form-group">
      <label>主题</label>
      <div class="btn-group" id="themeBtns">
        <button class="btn-opt" data-theme="dark">深色</button>
        <button class="btn-opt" data-theme="light">浅色</button>
      </div>
    </div>
    <div class="form-group">
      <label>审批模式</label>
      <div class="btn-group" id="approvalBtns" style="grid-template-columns:1fr 1fr 1fr;display:grid;gap:4px">
        <button class="btn-opt" data-mode="auto">自动</button>
        <button class="btn-opt" data-mode="auto-approve">auto-approve</button>
        <button class="btn-opt" data-mode="read-only">只读</button>
        <button class="btn-opt" data-mode="full-access">full-access</button>
        <button class="btn-opt" data-mode="yolo">yolo</button>
        <button class="btn-opt" data-mode="sandbox-required">sandbox</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveSettings()">保存</button>
      <button class="btn-secondary" onclick="closeSettings()">取消</button>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>
const STATE = {
  apiKey: localStorage.getItem('likecodex_api_key') || '',
  model: localStorage.getItem('likecodex_model') || 'deepseek-v4-flash',
  theme: localStorage.getItem('likecodex_theme') || 'dark',
  approvalMode: localStorage.getItem('likecodex_approval_mode') || 'auto',
  sessionId: localStorage.getItem('likecodex_session_id') || '',
  sidebarCollapsed: localStorage.getItem('likecodex_sidebar') === 'collapsed',
  sessions: [],
  messages: [],
  streaming: false,
  abortController: null,
};

const $ = id => document.getElementById(id);
document.documentElement.setAttribute('data-theme', STATE.theme);
applySidebar();

// --- Sidebar ---
function applySidebar() {
  $('sidebar').classList.toggle('collapsed', STATE.sidebarCollapsed);
}
function toggleSidebar() {
  STATE.sidebarCollapsed = !STATE.sidebarCollapsed;
  try { localStorage.setItem('likecodex_sidebar', STATE.sidebarCollapsed ? 'collapsed' : 'expanded'); } catch(e) {}
  applySidebar();
}
function collapseSidebar() { if(!STATE.sidebarCollapsed)toggleSidebar(); }
function expandSidebar() { if(STATE.sidebarCollapsed)toggleSidebar(); }

// --- Toast ---
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  $('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3000);
}

// --- API ---
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 15000);
  opts.signal = ctrl.signal;
  try {
    const r = await fetch(path, opts);
    clearTimeout(t);
    if (!r.ok) {
      let msg = 'HTTP ' + r.status;
      try { const j = await r.json(); msg = j.error || j.message || msg; } catch {}
      throw new Error(msg);
    }
    return r;
  } catch(e) {
    clearTimeout(t);
    throw e;
  }
}

// --- Sessions ---
async function loadSessions() {
  try {
    const r = await api('GET', '/sessions');
    const data = await r.json();
    STATE.sessions = data.sessions || [];
    renderSessions();
    // restore current selection
    const sel = document.querySelector('.session-item[data-id="' + STATE.sessionId + '"]');
    if (sel) sel.classList.add('active');
  } catch(e) { console.error('loadSessions', e); }
}

function renderSessions() {
  const list = $('sessionList');
  list.innerHTML = '';
  STATE.sessions.forEach(s => {
    const id = s.session_id || s.id;
    const name = s.label || s.name || id.substring(0, 8);
    const div = document.createElement('div');
    div.className = 'session-item' + (id === STATE.sessionId ? ' active' : '');
    div.dataset.id = id;
    div.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="flex-shrink:0;opacity:.5"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>' +
      '<span class="sess-name">' + escapeHtml(name) + '</span>' +
      '<button class="sess-del" onclick="event.stopPropagation();deleteSession(\'' + id + '\')" title="删除">&times;</button>';
    div.onclick = () => switchSession(id);
    list.appendChild(div);
  });
  updateMsgCount();
}

async function createNewSession() {
  // 空会话检测：当前会话为空时不允许新建，强制使用当前会话
  if (STATE.sessionId && STATE.messages.length === 0) {
    toast('当前会话为空，请先发送消息', 'info');
    return;
  }
  try {
    const r = await api('POST', '/new', {});
    const data = await r.json();
    STATE.sessionId = data.session_id;
    STATE.messages = [];
    localStorage.setItem('likecodex_session_id', STATE.sessionId);
    $('messages').style.display = 'none';
    $('emptyState').style.display = 'flex';
    $('messages').innerHTML = '';
    updateUI();
    await loadSessions();
    toast('新会话已创建', 'success');
  } catch(e) { toast('创建会话失败: ' + e.message, 'error'); }
}

async function switchSession(id) {
  if (id === STATE.sessionId) return;
  STATE.sessionId = id;
  STATE.messages = [];
  localStorage.setItem('likecodex_session_id', id);
  renderSessions();
  $('emptyState').style.display = 'none';
  $('messages').style.display = 'block';
  $('messages').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">加载中...</div>';
  try {
    const r = await api('GET', '/sessions/' + id + '/events');
    const data = await r.json();
    STATE.messages = [];
    (data.events || []).forEach(e => {
      // filter: only show user/assistant events, skip tool/ask/internal events
      const role = e.role || e.event_type;
      if (role === 'user' || role === 'assistant') {
        STATE.messages.push({ role, content: e.content || e.message || '' });
      }
    });
    renderMessages();
  } catch(e) {
    $('messages').innerHTML = '';
    toast('加载会话失败: ' + e.message, 'error');
  }
}

async function deleteSession(id) {
  try {
    await api('POST', '/sessions/delete', { session_id: id });
    if (STATE.sessionId === id) {
      STATE.sessionId = '';
      STATE.messages = [];
      $('messages').style.display = 'none';
      $('emptyState').style.display = 'flex';
      $('messages').innerHTML = '';
    }
    await loadSessions();
  } catch(e) { toast('删除失败', 'error'); }
}

// --- Messages ---
function renderMessages() {
  $('messages').style.display = 'block';
  $('emptyState').style.display = 'none';
  $('messages').innerHTML = '';
  STATE.messages.forEach(m => appendMessage(m.role, m.content, false));
  scrollToBottom();
  updateMsgCount();
}

function appendMessage(role, content, scroll) {
  $('messages').style.display = 'block';
  $('emptyState').style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  let reasoning = '', mainContent = content || '';
  const rm = mainContent.match(/<thinking>([\s\S]*?)<\/thinking>/);
  if (rm) { reasoning = rm[1].trim(); mainContent = mainContent.replace(/<thinking>[\s\S]*?<\/thinking>/, '').trim(); }
  const rendered = safeRender(mainContent);
  div.innerHTML = '<div class="msg-bubble"><div class="msg-header"><span class="avatar">' + (role==='user'?'U':'A') + '</span><span>' + (role==='user'?'你':'LikeCodex') + '</span></div>' +
    (reasoning ? '<div class="reasoning-block"><div class="reasoning-header" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'open\')"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"/></svg>推理过程</div><div class="reasoning-content">' + escapeHtml(reasoning) + '</div></div>' : '') +
    '<div class="msg-content">' + rendered + '</div></div>';
  $('messages').appendChild(div);
  try { div.querySelectorAll('pre code:not(.hljs)').forEach(b => hljs.highlightElement(b)); } catch(e) {}
  if (scroll !== false) scrollToBottom();
  updateMsgCount();
}

function scrollToBottom() {
  requestAnimationFrame(() => { $('messages').scrollTop = $('messages').scrollHeight; });
}

function updateMsgCount() {
  const el = $('msgCount');
  if (STATE.messages.length > 0) {
    el.style.display = 'inline';
    el.textContent = STATE.messages.length + ' 条消息';
  } else { el.style.display = 'none'; }
}

// --- Streaming render throttle ---
let _streamRaf = null, _streamPending = null;
function throttledUpdate(div, content, reasoning) {
  _streamPending = { div, content, reasoning };
  if (_streamRaf) return;
  _streamRaf = requestAnimationFrame(() => {
    _streamRaf = null;
    const p = _streamPending;
    _streamPending = null;
    if (!p || !p.div || !p.div.isConnected) return;
    const cd = p.div.querySelector('.msg-content');
    if (!cd) return;
    let h = '';
    if (p.reasoning) h += '<div class="reasoning-block"><div class="reasoning-header" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'open\')"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"/></svg>推理过程</div><div class="reasoning-content open">' + escapeHtml(p.reasoning) + '</div></div>';
    if (p.content) {
      h += safeRender(p.content);
    } else {
      h += '<div class="loading-dots"><span></span><span></span><span></span></div>';
    }
    cd.innerHTML = h;
    scrollToBottom();
    try { cd.querySelectorAll('pre code:not(.hljs)').forEach(b => hljs.highlightElement(b)); } catch(e) {}
  });
}

function flushStreamUpdate() {
  if (_streamRaf) { cancelAnimationFrame(_streamRaf); _streamRaf = null; }
  if (_streamPending) {
    const p = _streamPending;
    _streamPending = null;
    if (!p.div || !p.div.isConnected) return;
    const cd = p.div.querySelector('.msg-content');
    if (!cd) return;
    let h = '';
    if (p.reasoning) h += '<div class="reasoning-block"><div class="reasoning-header" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'open\')"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"/></svg>推理过程</div><div class="reasoning-content open">' + escapeHtml(p.reasoning) + '</div></div>';
    if (p.content) h += safeRender(p.content); else h += '<div class="loading-dots"><span></span><span></span><span></span></div>';
    cd.innerHTML = h;
    scrollToBottom();
    try { cd.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b)); } catch(e) {}
  }
}

// --- Send ---
async function handleSend() {
  const text = $('input').value.trim();
  if (!text || STATE.streaming) return;
  if (!STATE.sessionId) {
    try {
      const r = await api('POST', '/new', {});
      const data = await r.json();
      STATE.sessionId = data.session_id;
      localStorage.setItem('likecodex_session_id', STATE.sessionId);
      await loadSessions();
    } catch(e) { toast('创建会话失败: ' + e.message, 'error'); return; }
  }
  $('input').value = ''; autoResize($('input'));
  appendMessage('user', text);
  STATE.messages.push({ role: 'user', content: text });
  const aid = document.createElement('div');
  aid.className = 'msg assistant';
  aid.innerHTML = '<div class="msg-bubble"><div class="msg-header"><span class="avatar">A</span><span>LikeCodex</span></div><div class="msg-content"><div class="loading-dots"><span></span><span></span><span></span></div></div></div>';
  $('messages').appendChild(aid); scrollToBottom();
  STATE.streaming = true; STATE.abortController = new AbortController();
  let fullContent = '', reasoningContent = '', inReasoning = false;
  try {
    const body = { prompt: text, session_id: STATE.sessionId };
    if (STATE.apiKey) body.api_key = STATE.apiKey;
    if (STATE.model) body.model = STATE.model;
    const r = await fetch('/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body), signal: STATE.abortController.signal
    });
    if (!r.ok) { let m = 'HTTP ' + r.status; try { const j = await r.json(); m = j.error || m; } catch {} throw new Error(m); }
    const reader = r.body.getReader();
    const dec = new TextDecoder(); let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream: true});
      const lines = buf.split('\n'); buf = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const ds = line.slice(6).trim();
        if (ds === '[DONE]') continue;
        try {
          const d = JSON.parse(ds);
          if (d.type === 'delta' && d.content) {
            fullContent += d.content;
            if (d.content.includes('<thinking>')) inReasoning = true;
            if (d.content.includes('</thinking>')) inReasoning = false;
            if (inReasoning && !d.content.includes('<thinking>')) reasoningContent += d.content;
            throttledUpdate(aid, fullContent, reasoningContent);
          } else if (d.type === 'assistant' && d.content) {
            // assistant 事件携带完整内容，但已通过 delta 事件累积，跳过避免重复
            if (!fullContent) fullContent = d.content;
            throttledUpdate(aid, fullContent, reasoningContent);
          } else if (d.type === 'tool_calls' && d.tool_calls) {
            const tc = d.tool_calls.map(t => '<div class="tool-call"><div class="tc-name"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.743 3.743 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.06 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75Zm7.251 10.324a3.247 3.247 0 0 0-.31-.309L7 11.759V3.434c0-.411-.333-.746-.745-.746H1.5v9.75h3.758a3.75 3.75 0 0 1 1.993.636Z"/></svg>' + escapeHtml(t.name||t.id) + '</div><div class="tc-args">' + escapeHtml(JSON.stringify(t.arguments,null,2)) + '</div></div>').join('');
            aid.querySelector('.msg-content').innerHTML = safeRender(fullContent) + tc;
          } else if (d.type === 'error') { throw new Error(d.content || 'Unknown error'); }
        } catch(e) { if (e.message.includes('JSON')||e.message.includes('parse')) continue; throw e; }
      }
    }
    flushStreamUpdate();
    STATE.messages.push({ role: 'assistant', content: fullContent || '(no response)' });
    updateMsgCount();
  } catch(e) {
    if (e.name !== 'AbortError') {
      aid.querySelector('.msg-content').innerHTML = '<div style="color:var(--red)">错误: ' + escapeHtml(e.message) + '</div>';
      toast('请求失败: ' + e.message, 'error');
    }
  }
  STATE.streaming = false; STATE.abortController = null;
  $('sendBtn').disabled = !$('input').value.trim();
}

function updateAssistant(div, content, reasoning) {
  const cd = div.querySelector('.msg-content');
  let h = '';
  if (reasoning) h += '<div class="reasoning-block"><div class="reasoning-header" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'open\')"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"/></svg>推理过程</div><div class="reasoning-content open">' + escapeHtml(reasoning) + '</div></div>';
  if (content) h += safeRender(content); else h += '<div class="loading-dots"><span></span><span></span><span></span></div>';
  cd.innerHTML = h;
  scrollToBottom();
  try { div.querySelectorAll('pre code:not(.hljs)').forEach(b => hljs.highlightElement(b)); } catch(e) {}
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); handleSend(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 240) + 'px';
  $('sendBtn').disabled = !el.value.trim() || STATE.streaming;
}

// --- Settings ---
function openSettings() {
  $('settingsApiKey').value = STATE.apiKey;
  $('keyToggle').textContent = $('settingsApiKey').type === 'password' ? '显示' : '隐藏';
  document.querySelectorAll('#modelBtns .btn-opt').forEach(b => b.classList.toggle('active', b.dataset.model === STATE.model));
  document.querySelectorAll('#themeBtns .btn-opt').forEach(b => b.classList.toggle('active', b.dataset.theme === STATE.theme));
  document.querySelectorAll('#approvalBtns .btn-opt').forEach(b => b.classList.toggle('active', b.dataset.mode === STATE.approvalMode));
  $('settingsOverlay').classList.add('open');
}
function closeSettings() { $('settingsOverlay').classList.remove('open'); }

function saveSettings() {
  const k = $('settingsApiKey').value.trim();
  if (k) { STATE.apiKey = k; localStorage.setItem('likecodex_api_key', k); }
  const mb = document.querySelector('#modelBtns .btn-opt.active');
  if (mb) { STATE.model = mb.dataset.model; localStorage.setItem('likecodex_model', STATE.model); }
  const tb = document.querySelector('#themeBtns .btn-opt.active');
  if (tb) { STATE.theme = tb.dataset.theme; localStorage.setItem('likecodex_theme', STATE.theme); document.documentElement.setAttribute('data-theme', STATE.theme); }
  const ab = document.querySelector('#approvalBtns .btn-opt.active');
  if (ab) { STATE.approvalMode = ab.dataset.mode; localStorage.setItem('likecodex_approval_mode', STATE.approvalMode); if(STATE.sessionId) api('POST','/tool-approval-mode',{session_id:STATE.sessionId,mode:STATE.approvalMode}).catch(()=>{}); }
  updateUI(); closeSettings(); toast('设置已保存','success');
  // Set model click handlers
  document.querySelectorAll('#modelBtns .btn-opt').forEach(b => {
    b.onclick = () => { document.querySelectorAll('#modelBtns .btn-opt').forEach(x => x.classList.remove('active')); b.classList.add('active'); STATE.model = b.dataset.model; localStorage.setItem('likecodex_model', STATE.model); };
  });
  document.querySelectorAll('#themeBtns .btn-opt').forEach(b => {
    b.onclick = () => { document.querySelectorAll('#themeBtns .btn-opt').forEach(x => x.classList.remove('active')); b.classList.add('active'); };
  });
  document.querySelectorAll('#approvalBtns .btn-opt').forEach(b => {
    b.onclick = () => { document.querySelectorAll('#approvalBtns .btn-opt').forEach(x => x.classList.remove('active')); b.classList.add('active'); };
  });
}

function toggleKeyVisibility() {
  const el = $('settingsApiKey');
  el.type = el.type === 'password' ? 'text' : 'password';
  $('keyToggle').textContent = el.type === 'password' ? '显示' : '隐藏';
}

function updateUI() {
  const ks = $('apiKeyStatus'), d = ks.querySelector('.status-dot');
  d.className = 'status-dot ' + (STATE.apiKey ? 'green' : 'yellow');
  ks.title = STATE.apiKey ? 'API Key 已配置' : '未配置 API Key';
  $('modelStatus').textContent = '模型: ' + (STATE.model === 'deepseek-v4-flash' ? 'Flash' : 'Pro');
  $('sessionInfo').textContent = STATE.sessionId ? '会话: ' + STATE.sessionId.substring(0, 8) : '';
}

// --- Shortcuts ---
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && $('settingsOverlay').classList.contains('open')) closeSettings();
  if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); toggleSidebar(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); createNewSession(); }
});

// --- Init ---
