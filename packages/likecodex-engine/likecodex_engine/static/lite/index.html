<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LikeCodex Lite</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: #0d1117; color: #e6edf3; height: 100vh;
  display: flex; flex-direction: column;
}
#status {
  display: flex; gap: 16px; padding: 6px 16px;
  background: #161b22; font-size: 0.8em; color: #8b949e;
  align-items: center; border-bottom: 1px solid #30363d;
}
#status .title { color: #e6edf3; font-weight: 600; }
#status .hit-rate { color: #3fb950; }
#status .miss-rate { color: #f85149; }
#chat {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.msg {
  padding: 10px 14px; border-radius: 8px;
  max-width: 85%; line-height: 1.5; font-size: 14px;
}
.msg.user {
  background: #1f6feb; color: #fff;
  align-self: flex-end;
}
.msg.assistant {
  background: #21262d; color: #e6edf3;
  align-self: flex-start;
  border: 1px solid #30363d;
}
.msg.tool {
  background: #0d1117; color: #8b949e;
  align-self: flex-start; font-size: 0.85em;
  border-left: 3px solid #d29922; border-radius: 4px;
  max-width: 100%;
}
.msg.system {
  background: transparent; color: #8b949e;
  align-self: center; font-size: 0.8em;
  font-style: italic;
}
.msg pre {
  background: #161b22; padding: 10px; border-radius: 6px;
  overflow-x: auto; margin: 8px 0; font-size: 0.9em;
  border: 1px solid #30363d;
}
.msg code {
  font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  font-size: 0.9em;
}
.msg p { margin: 4px 0; }
.msg ul, .msg ol { margin: 4px 0; padding-left: 20px; }
#input-area {
  display: flex; padding: 12px; border-top: 1px solid #30363d;
  gap: 8px; background: #0d1117;
}
#input {
  flex: 1; background: #161b22; border: 1px solid #30363d;
  color: #e6edf3; padding: 10px 14px; border-radius: 6px;
  font-size: 14px; resize: none; outline: none; font-family: inherit;
}
#input:focus { border-color: #1f6feb; }
#send {
  background: #238636; color: #fff; border: none;
  padding: 10px 24px; border-radius: 6px; cursor: pointer;
  font-size: 14px; font-weight: 600;
}
#send:hover { background: #2ea043; }
#send:disabled { opacity: 0.5; cursor: not-allowed; }
.loading::after {
  content: '...'; animation: dots 1.5s steps(4, end) infinite;
}
@keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
</style>
</head>
<body>
<div id="status">
  <span class="title">LikeCodex Lite</span>
  <span>模型: <span id="model-name">deepseek-v4-flash</span></span>
  <span>缓存: <span id="cache-rate" class="hit-rate">--%</span></span>
</div>
<div id="chat"></div>
<div id="input-area">
  <textarea id="input" rows="2" placeholder="输入问题... (Enter 发送, Shift+Enter 换行)"></textarea>
  <button id="send" onclick="sendMessage()">发送</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const cacheRate = document.getElementById('cache-rate');
const modelName = document.getElementById('model-name');

let sessionId = crypto.randomUUID();
let isStreaming = false;

// Minimal Markdown renderer
function renderMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(\S[^*]*\S)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(\S[^*]*\S)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'assistant') {
    div.innerHTML = renderMarkdown(content);
  } else {
    div.textContent = content;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function getLastAssistantDiv() {
  const msgs = chat.querySelectorAll('.msg.assistant');
  return msgs.length > 0 ? msgs[msgs.length - 1] : null;
}

async function sendMessage() {
  if (isStreaming) return;
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text);
  input.value = '';
  isStreaming = true;
  sendBtn.disabled = true;

  // Add placeholder assistant message
  const assistantDiv = document.createElement('div');
  assistantDiv.className = 'msg assistant loading';
  assistantDiv.textContent = '';
  chat.appendChild(assistantDiv);
  chat.scrollTop = chat.scrollHeight;

  try {
    const baseUrl = window.location.origin;
    const response = await fetch(baseUrl + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: text,
        session_id: sessionId,
        no_tools: false,
      }),
    });

    if (!response.ok) {
      throw new Error('HTTP ' + response.status);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let assistantContent = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const json = JSON.parse(data);

          if (json.type === 'delta' && json.content) {
            assistantContent += json.content;
            assistantDiv.className = 'msg assistant';
            assistantDiv.innerHTML = renderMarkdown(assistantContent);
            chat.scrollTop = chat.scrollHeight;
          } else if (json.type === 'assistant' && json.content) {
            assistantContent += json.content;
            assistantDiv.className = 'msg assistant';
            assistantDiv.innerHTML = renderMarkdown(assistantContent);
            chat.scrollTop = chat.scrollHeight;
          } else if (json.type === 'cache_stats' && json.cache) {
            const rate = json.cache.hit_rate;
            if (rate !== undefined && rate !== null) {
              cacheRate.textContent = (rate * 100).toFixed(1) + '%';
            }
          } else if (json.type === 'model') {
            if (json.model) modelName.textContent = json.model;
          } else if (json.type === 'phase' && json.metadata?.phase === 'planning') {
            const phaseDiv = document.createElement('div');
            phaseDiv.className = 'msg system';
            phaseDiv.textContent = '🧠 规划中...';
            chat.appendChild(phaseDiv);
            chat.scrollTop = chat.scrollHeight;
          } else if (json.type === 'plan' && json.content) {
            const planDiv = document.createElement('div');
            planDiv.className = 'msg tool';
            planDiv.textContent = '计划:\n' + json.content;
            chat.appendChild(planDiv);
            chat.scrollTop = chat.scrollHeight;
          } else if (json.type === 'reasoning' && json.content) {
            assistantContent += '\n\n*推理过程:* ' + json.content;
          }
        } catch (e) {
          // ignore parse errors for incomplete chunks
        }
      }
    }

    // Process remaining buffer
    if (buffer.startsWith('data: ')) {
      const data = buffer.slice(6).trim();
      if (data !== '[DONE]') {
        try {
          const json = JSON.parse(data);
          if (json.type === 'delta' && json.content) {
            assistantContent += json.content;
            assistantDiv.className = 'msg assistant';
            assistantDiv.innerHTML = renderMarkdown(assistantContent);
          } else if (json.type === 'assistant' && json.content) {
            assistantContent += json.content;
            assistantDiv.className = 'msg assistant';
            assistantDiv.innerHTML = renderMarkdown(assistantContent);
          } else if (json.type === 'cache_stats' && json.cache) {
            const rate = json.cache.hit_rate;
            if (rate !== undefined && rate !== null) {
              cacheRate.textContent = (rate * 100).toFixed(1) + '%';
            }
          }
        } catch (e) {}
      }
    }

    if (!assistantContent) {
      assistantDiv.className = 'msg assistant';
      assistantDiv.textContent = '(empty response)';
    }
  } catch (err) {
    const errorDiv = document.createElement('div');
    errorDiv.className = 'msg system';
    errorDiv.textContent = '❌ 连接错误: ' + err.message;
    chat.appendChild(errorDiv);
  }

  isStreaming = false;
  sendBtn.disabled = false;
  chat.scrollTop = chat.scrollHeight;
}

// Enter sends, Shift+Enter newline
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
