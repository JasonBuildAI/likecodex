name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # For PyPI trusted publishing

jobs:
  # ------------------------------------------------------------------
  # PyPI: build and publish Python package
  # ------------------------------------------------------------------
  pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/likecodex/
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Build wheel and sdist
        run: uv build --all-packages
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ------------------------------------------------------------------
  # Rust: cross-platform binary builds
  # ------------------------------------------------------------------
  build:
    needs: pypi
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: likecodex-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: likecodex-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: likecodex-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: likecodex-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-packages
      - run: cargo build --release -p likecodex-cli --target ${{ matrix.target }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/likecodex*

  # ------------------------------------------------------------------
  # GitHub Release: attach binaries and changelog
  # ------------------------------------------------------------------
  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -name 'likecodex*' -exec cp {} release/ \;
          ls -la release
      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: |
            {
              "categories": [
                {"title": "## 🚀 Features", "labels": ["feat"]},
                {"title": "## 🐛 Bug Fixes", "labels": ["fix"]},
                {"title": "## 📚 Documentation", "labels": ["docs"]},
                {"title": "## 🧪 Tests", "labels": ["test"]},
                {"title": "## 🔧 Maintenance", "labels": ["chore", "refactor"]}
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: ${{ steps.changelog.outputs.changelog }}
          files: release/*
