services:
  # ── Python Engine (always required) ──
  engine:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: uv run python -m likecodex_engine.server
    environment:
      LIKECODEX_ENGINE_HOST: 0.0.0.0
      LIKECODEX_ENGINE_PORT: 9090
      LIKECODEX_WORKING_DIR: /app
    ports:
      - "9090:9090"

  # ── Rust API Server (optional - comment out for Python-only mode) ──
